env:
  env_name: Pupper
  env_mode: neural
  # model_path: /teamspace/studios/this_studio/NeRDpuppies/data/trained_models/Pupper/04-11-2026-18-08-14/nn/final_model.pt
  model_path: ../../../data/trained_models/Pupper/test/04-18-2026-05-32-44/nn/best_eval_model.pt
  num_envs: 500

  max_episode_length: 1000
  reward_bias: 0.
    
  warp_env_cfg:
    obs_type: dflex
    task: forward
    random_reset: True
    camera_tracking: True
  
rl:
  config:
    name: PupperPPO
    wandb_activate: True
    wandb_project: pupper-nerd
    wandb_run_name: pupper_forward_v1
    max_epochs: 500
    horizon_length: 32
    normalize_input: True
    normalize_value: True
    reward_shaper:
      scale_value: 1.
    normalize_advantage: True
    gamma: 0.99
    tau: 0.95
    learning_rate: 0.0003
    lr_schedule: adaptive
    kl_threshold: 0.008
    score_to_win: 3000000
    save_best_after: 10
    save_frequency: 50
    grad_norm: 1.0
    entropy_coef: 0.0
    truncate_grads: True
    e_clip: 0.2
    minibatch_size: 1600
    mini_epochs: 5
    critic_coef: 4
    clip_value: True
    seq_length: 8
    bounds_loss_coef: 0.0001
    
    player:
      determenistic: True
      games_num: 2
      num_actors: 3
      print_stats: True
  
  network:
    mlp:
      units: [128, 64, 32]
      activation: relu
      d2rl: False
      initializer:
        name: default
      regularizer:
        name: None
  
  other_params:
    fixed_sigma: True


